    Academic_Publications: # 注意：RenderCV 有时对标题有要求，如果没显示可以改成 Publications
      - title: "FNIN: A FNO-based Numerical Integration Network for Surface-form-gradients"
        authors:
          - "**Jiaqi Leng**"
          - "Yakun Ju"
          - "Yuanxu Duan"
          - "Jiangnan Zhang"
          - "Qingxuan Lv"
          - "Zuxuan Wu"
          - "Hao Fan"
        doi: "" # 如果有可以填
        journal: "AAAI-25 Oral"
        date: 2025
        highlights:
          - "Formulated **geometric constraints** as iterative **PDEs** and utilized a FNO-based architecture to achieve **discretization invariance** across arbitrary resolutions."
          - "Designed detail-weighted loss and least-square equations to handle surface discontinuities, significantly outperforming traditional numerical solvers."

      - title: "PSD: Leveraging 2D Rewards to Align Text-to-3D Generation with Human Preference"
        authors:
          - "**Jiaqi Leng**"
          - "Shuyuan Tu"
          - "Haidong Cao"
          - "Sicheng Xie"
          - "Daoguo Dong"
          - "Zuxuan Wu"
          - "Yu-Gang Jiang"
        journal: "ICML-26 Sub."
        date: 2026
        highlights:
          - "Proposed a training-free alignment framework using CFG-style 2D reward guidance, bypassing the need for additional reward model training or **diffusion priors**."
          - "Introduced a negative embedding optimization strategy to enhance the alignment, outperforming state-of-the-art methods in human preference alignment."

      - title: "Other Publications"
        highlights:
          - "**S. Xie**, ..., **Jiaqi Leng**, et al. \"Human2robot: Learning Robot Actions from Paired Videos.\" (AAAI-26 Oral)"
          - "**S. Xie**, ..., **Jiaqi Leng**, et al. \"Stable Offline Hand-Eye Calibration for any Robot.\" (arXiv-25.11)"
          - "**Jiaqi Leng**, et al. \"Multilevel Inverse Patchmatch Network for Underwater Stereo Matching.\" (JMSE-23)"
          - "**Jiaqi Leng**, et al. \"Underwater Stereo Matching via Recurrent Field Transforms.\" (ICGIP-22)"

    Ongoing_Projects:
      - title: "Robust (Near-)Real-time GS-SLAM with Learned Motion Priors"
        date: "2026.05 Expected"
        highlights:
          - "Developing a **dynamic GS-SLAM** system that **decouples 3D motion** via point tracking models (**motion priors**) to drive dynamic Gaussian primitives."
          - "Investigating the bi-directional benefits of RGB supervision to enhance **motion priors** and overall **SLAM robustness** in complex, non-rigid dynamic scenes."

      - title: "Generative Foundation Priors for Physics-Constrained 3D Reconstruction"
        date: "Exploratory"
        highlights:
          - "Exploring the fusion of **generative foundation models** with **physical constraints** (e.g., **PDEs**) to address data scarcity and dimensionality issues."
          - "Evaluating the feasibility of utilizing web-scale image and video datasets as a rich prior source for **physics-constrained** space reconstruction."

