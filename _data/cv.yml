    Projects:
      - name: Robust (Near-)Real-time GS-SLAM with Learned Motion Priors
        start_date: 2024
        end_date: 2026-05 (Expected)
        highlights:
          - "Developing a **dynamic GS-SLAM** system that **decouples 3D motion** via point tracking models (**motion priors**) to drive dynamic Gaussian primitives."
          - "Investigating the bi-directional benefits of RGB supervision to enhance **motion priors** and overall **SLAM robustness**."

      - name: Generative Foundation Priors for Physics-Constrained 3D Reconstruction
        start_date: 2024
        end_date: Exploratory
        highlights:
          - "Exploring the fusion of **generative foundation models** with **physical constraints** (e.g., **PDEs**) to address data scarcity and dimensionality issues."

